<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" preserveAspectRatio="none" aria-hidden="true">
  <!--
    Brush stroke #2 — slight downward bow with mid-pinch.
    Different `seed` + displacement scale than #1 so the noise visibly
    differs between consecutive words (avoids visual repetition).
  -->
  <defs>
    <filter id="mm-brush-rough-2" x="-4%" y="-12%" width="108%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.07 0.13" numOctaves="2" seed="29"/>
      <feDisplacementMap in="SourceGraphic" scale="7"/>
    </filter>
  </defs>
  <path
    d="M 10 10
       C 60 12, 110 18, 160 14
       C 198 12, 222 8, 232 14
       Q 234 30, 226 64
       C 170 74, 110 68, 60 70
       C 30 72, 14 66, 6 60
       Q 2 30, 10 10 Z"
    fill="#fff"
    filter="url(#mm-brush-rough-2)"
  />
</svg>

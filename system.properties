# ============================================
# Golden English — system.properties
# ============================================
# Origen de verdad para: identidad de marca, tokens visuales (colores, tipografía,
# layout), datos de contacto/redes, y algunos parámetros operativos leídos en
# servidor (edad legal, facturación, académicos, analítica, avisos de matrícula).
#
# Carga típica en la app:
# - Tema CSS: `src/app/layout.tsx` vía `loadProperties()` + variables CSS.
# - Marca pública/SEO: `src/lib/brand/server.ts`, metadatos, JSON-LD, manifest.
# - Claves sueltas: `getProperty(loadProperties(), "clave", "fallback")` en módulos
#   bajo `src/lib/` (p. ej. `getBillingTerms`, `legalAge`, portal docente,
#   `academicsAttendanceMatrixProperties`, etc.).
# ============================================

# ---------- Identidad de marca (nombre legal, eslogan, activos) ----------
# Uso: textos y assets de marca en layouts, landing, dashboard, SEO; no duplicar
# nombres legales ni rutas de logo en código ni en diccionarios.
app.name=Golden English
app.legal.name=Instituto de Lenguas Golden English
app.tagline=Más de 20 años enseñando inglés, creando oportunidades
app.tagline.en=Over 20 years teaching English, creating opportunities
app.legal.registry=Resolución 1297/05 - Ministerio de Educación, Formosa
app.logo.path=/images/logo.png
app.logo.alt=Logo GE Golden English
app.favicon.path=/favicon_io/favicon.ico

# ---------- Paleta primaria (marca / textos principales) ----------
# Uso: tokens `--color-primary*` en tema y componentes (Tailwind / CSS variables).
color.primary=#103A5C
color.primary.light=#2A5B84
color.primary.dark=#0A253D
color.primary.foreground=#FFFFFF

# ---------- Paleta secundaria (acento rojo del logo) ----------
# Uso: CTAs secundarios, acentos de marca, `--color-secondary*`.
color.secondary=#A31A22
color.secondary.light=#D43D46
color.secondary.dark=#730F15
color.secondary.foreground=#FFFFFF

# ---------- Acento (dorado / banners) ----------
# Uso: highlights, chips, `--color-accent*`.
color.accent=#F0B932
color.accent.foreground=#0F1F33

# ---------- Neutros (fondo, texto, bordes) ----------
# Uso: superficies, texto body, bordes; `--color-background`, `--color-surface`,
# `--color-foreground`, etc. Valores alineados con `src/app/globals.css` real.
color.background=#FAF9F6
color.surface=#FFFFFF
color.foreground=#103A5C
color.muted=#F0EFEA
color.muted.foreground=#5C6B7A
color.border=#E2E0D8

# ---------- Estado (success / warning / error / info) ----------
# Uso: badges, alertas, banners; tokens `--color-success`, `--color-warning`, etc.
color.success=#16A34A
color.warning=#EAB308
color.error=#DC2626
color.info=#2563EB

# ---------- Sombras (cards / superficies elevadas) ----------
# Uso: tokens `--shadow-soft`, `--shadow-card` para Tailwind / componentes.
shadow.soft=0 4px 24px -4px rgb(16 58 92 / 12%)
shadow.card=0 12px 40px -12px rgb(16 58 92 / 18%)

# ---------- Calendario portal — tipos de evento especiales (leyenda / chips) ----------
# Consumidos vía variables CSS (--color-calendarSpecial-*) en chips del calendario.
color.calendarSpecial.holiday=#374151
color.calendarSpecial.institutionalExam=#991B1B
color.calendarSpecial.parentMeeting=#6D28D9
color.calendarSpecial.social=#166534
color.calendarSpecial.trimesterAdmin=#1E40AF

# ---------- Tipografía (nombres lógicos; las fuentes reales se cargan en layout) ----------
# Uso: `next/font` + tokens de fuente en tema (DM Sans, Fraunces, JetBrains Mono).
font.primary=DM Sans
font.secondary=Fraunces
font.mono=JetBrains Mono

# ---------- Layout (ancho máximo del contenido, radio de bordes) ----------
# Uso: `--layout-max-width`, `--layout-border-radius` en shells y tarjetas.
layout.max.width=1280px
layout.border.radius=0.75rem

# ---------- Contacto público ----------
# Uso: pie de página, bloques de contacto, metadatos donde aplique la capa brand.
contact.email=crisins@hotmail.com
contact.phone=+54 9 3718 528-383 
contact.address=Riacho He Hé, Provincia de Formosa, Argentina

# ---------- Redes y WhatsApp ----------
# Uso: enlaces a redes en footer/landing; mismas URLs en toda la app.
social.facebook=https://www.facebook.com/Lateachergolden
social.instagram=https://www.instagram.com/goldenenglishok/
social.whatsapp=https://wa.me/5493718528383

# ---------- Legal — edad de mayoría ----------
# Uso: `getLegalAgeMajorityFromSystem()` (`src/lib/brand/legalAge.ts`): menoría,
# tutor, reglas de portal alineadas con políticas y (en despliegue) `site_settings`.
legal.age.majority=18

# ---------- Alumno adulto — aviso de renovación de matrícula en dashboard ----------
# Uso: `getStudentEnrollmentRenewalWarnDaysFromSystem()`: si el último pago de
# matrícula supera estos días, el portal muestra aviso a alumnos no menores (1–3650).
student.enrollment.renewal.warn.days=300

# ---------- Facturación — términos visibles (ES por defecto + EN) ----------
# Uso: `getBillingTerms()` para copy de cuotas/matrícula/promos sin duplicar literales.
# El monto de matrícula NO vive aquí: se define por sección
# (`academic_sections.enrollment_fee_amount`, ADR 2026-04-section-enrollment-fee).
billing.term.enrollment=Matrícula
billing.term.enrollment.en=Enrollment fee
billing.term.monthly=Mensualidad
billing.term.monthly.en=Monthly fee
billing.term.promotion=Promoción
billing.term.promotion.en=Promotion

# ---------- Académicos — cupos y portal docente ----------
# `academics.section.max_students`: tope por defecto al crear secciones (override por fila).
# `academics.teacherPortal.allowedProfileRoles`: roles de perfil que pueden usar secciones docente.
academics.section.max_students=60
academics.teacherPortal.allowedProfileRoles=teacher,assistant

# ---------- Académicos — matriz de asistencia (docente / admin) ----------
# Consumidos en `src/lib/academics/academicsAttendanceMatrixProperties.ts` (rangos seguros de parseo ahí).
# `teacher.scanLookbackBufferDays`: días civiles extra al retroceder el piso operacional (alinear semanas con horario).
# `teacher.operationalCivilLookbackDays`: días civiles hacia atrás desde “hoy” instituto para el piso de la vista operacional.
# `teacher.operationalMaxClassDays`: máx. columnas (días con clase) en vista operacional del portal docente.
# `teacher.fullCourseMaxClassDays`: máx. columnas en vista curso completo docente / default si no se pasa `maxClassDays`.
# `admin.fallbackLookbackDays`: si la sección no tiene `starts_on`, días civiles de lookback desde hoy (matriz).
# `admin.maxClassDays`: máx. columnas en la matriz de asistencia admin.
# `pickAdjacentCivilDays`: radio al ajustar una fecha pedida al siguiente/anterior día con clase.
# `hasEligibleWindowMaxScans`: tope de iteraciones al buscar un día con clase en una ventana civil.
academics.attendance.matrix.teacher.scanLookbackBufferDays=7
academics.attendance.matrix.teacher.operationalCivilLookbackDays=14
academics.attendance.matrix.teacher.operationalMaxClassDays=28
academics.attendance.matrix.teacher.fullCourseMaxClassDays=156
academics.attendance.matrix.admin.fallbackLookbackDays=400
academics.attendance.matrix.admin.maxClassDays=520
academics.attendance.matrix.pickAdjacentCivilDays=14
academics.attendance.matrix.hasEligibleWindowMaxScans=400

# ---------- Analítica ----------
# `analytics.event.namespace` / `analytics.event.version`: prefijos/versionado de eventos
#   (exportes, informes; sin PII).
# `analytics.timezone`: calendario “instituto” (p. ej. mes actual en resumen de cuotas padre)
#   y coherencia con ventanas de fecha donde se use la misma zona.
analytics.event.namespace=goldenenglish
analytics.event.version=1
analytics.timezone=America/Argentina/Cordoba
